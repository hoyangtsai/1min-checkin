name: '1min.ai Auto Checkin'
description: '1min.ai Auto Checkin GitHub Action'
author: 'Your Name'

inputs:
  email:
    description: '1min.ai account email'
    required: true
  password:
    description: '1min.ai account password'
    required: true
  totp_secret:
    description: 'TOTP secret key (if 2FA is enabled)'
    required: false
  telegram_bot_token:
    description: 'Telegram bot token for notifications (optional)'
    required: false
  telegram_chat_id:
    description: 'Telegram chat ID for notifications (optional)'
    required: false

runs:
  using: 'node24'
  main: 'dist/index.js'

branding:
  icon: 'check-circle'
  color: 'green'